<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Compteur Managers</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<style>
body { font-family: Arial; text-align:center; background:#f4f4f4; }
.container { margin-top:40px; }
.item { background:white; padding:15px; margin:10px; border-radius:8px; display:inline-block; width:200px; }
button { padding:6px 12px; margin-top:5px; cursor:pointer; }
.hidden { display:none; }
</style>
</head>
<body>

<div id="login" class="container">
<h2>Connexion Manager</h2>
<input type="password" id="password" placeholder="Mot de passe">
<br><br>
<button onclick="login()">Entrer</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" class="hidden">
<h2 id="welcome"></h2>
<p>Total clics : <strong id="totalClicks">0</strong></p>
<div id="items"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3nNMv12lIJcVrYyldg8dtNeRFKMldAo4",
  authDomain: "compteur-stn.firebaseapp.com",
  projectId: "compteur-stn",
  storageBucket: "compteur-stn.firebasestorage.app",
  messagingSenderId: "661197584248",
  appId: "1:661197584248:web:1dc33900c4422df4c53a8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const passwords = {
  "medine": "Le Havre",
  "dembele": "Evreux",
  "johannes": "Mondeville",
  "orelsan": "Caen",
  "lincheneau": "La Glacerie",
  "riles": "Rouen",
  "secteurstn": "Mariama"
};

const itemsList = [
  "Broadband",
  "Socle Mobiles",
  "MEV",
  "Terminaux",
  "Assurances",
  "Cyber",
  "MP",
  "Pros"
];

let currentUser = "";
let globalData = {};

window.login = async function() {
  const pass = document.getElementById("password").value;

  if(passwords[pass]){
    currentUser = passwords[pass];
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("welcome").innerText = "Bienvenue " + currentUser;
    loadData();
  } else {
    document.getElementById("error").innerText = "Mot de passe incorrect";
  }
}

async function loadData(){
  const ref = doc(db, "global", "objectifs");
  const snap = await getDoc(ref);

  if(snap.exists()){
    globalData = snap.data();
  } else {
    globalData = { totalClicks: 0 };
    itemsList.forEach(item => globalData[item] = 0);
    await setDoc(ref, globalData);
  }

  displayItems();
}

function displayItems(){
  document.getElementById("totalClicks").innerText = globalData.totalClicks;
  const container = document.getElementById("items");
  container.innerHTML = "";

  itemsList.forEach(item=>{
    const div = document.createElement("div");
    div.className = "item";

    let adminControls = "";

    if(currentUser === "Mariama"){
      adminControls = `
        <input type="number" placeholder="Nouvel objectif" id="input-${item}">
        <br>
        <button onclick="setObjective('${item}')">Définir objectif</button>
        <br><br>
      `;
    }

    div.innerHTML = `
      <h3>${item}</h3>
      <p>Restant: <strong>${globalData[item]}</strong></p>
      ${adminControls}
      <button onclick="decrement('${item}')">Valider une vente</button>
    `;

    container.appendChild(div);
  });
}

window.setObjective = async function(item){
  if(currentUser !== "Mariama") return;

  const val = parseInt(document.getElementById("input-"+item).value);
  if(!isNaN(val)){
    globalData[item] = val;

    await updateDoc(doc(db, "global", "objectifs"), {
      [item]: val
    });

    displayItems();
  }
}

window.decrement = async function(item){

  if(globalData[item] <= 0){
    alert("Objectif atteint !");
    return;
  }

  const confirmation = confirm("Confirmer cette action ?");
  if(!confirmation) return;

  globalData[item]--;
  globalData.totalClicks++;

  await updateDoc(doc(db, "global", "objectifs"), {
    [item]: globalData[item],
    totalClicks: globalData.totalClicks
  });

  displayItems();
}
</script>

</body>

</>
