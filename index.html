<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Compteur Managers</title>

<style>
body { font-family: Arial; text-align:center; background:#f4f4f4; }
.container { margin-top:40px; }
.item { background:white; padding:15px; margin:10px; border-radius:8px; display:inline-block; width:220px; }
button { padding:6px 12px; margin-top:8px; cursor:pointer; }
.hidden { display:none; }
input { padding:5px; width:100px; text-align:center; }
.admin-panel { margin-bottom:20px; }
.personal-box {
  background:#222;
  color:white;
  padding:10px;
  border-radius:8px;
  display:inline-block;
  margin-bottom:20px;
}
</style>
</head>
<body>

<div id="login" class="container">
<h2>Connexion Manager</h2>
<input type="password" id="password" placeholder="Mot de passe">
<br><br>
<button onclick="login()">Entrer</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" class="hidden">
<h2 id="welcome"></h2>

<div class="personal-box">
Mes ventes aujourd'hui : <strong id="personalCount">0</strong>
</div>

<p>Total équipe : <strong id="totalClicks">0</strong></p>

<div id="adminPanel" class="admin-panel hidden">
<h3>Définition des objectifs</h3>
<div id="adminInputs"></div>
<button onclick="saveAllObjectives()">Valider tous les objectifs</button>
<br><br>
<button onclick="resetAll()" style="background:#d9534f;color:white;">
Reset hebdomadaire
</button>
<hr>
</div>

<div id="items"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3nNMv12lIJcVrYyldg8dtNeRFKMldAo4",
  authDomain: "compteur-stn.firebaseapp.com",
  projectId: "compteur-stn",
  storageBucket: "compteur-stn.firebasestorage.app",
  messagingSenderId: "661197584248",
  appId: "1:661197584248:web:1dc33900c4422df4c53a8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const passwords = {
  "medine": "Le Havre",
  "dembele": "Evreux",
  "johannes": "Mondeville",
  "orelsan": "Caen",
  "lincheneau": "La Glacerie",
  "riles": "Rouen",
  "secteurstn": "Mariama"
};

const itemsList = [
  "Broadband",
  "Socle Mobiles",
  "MEV",
  "Terminaux",
  "Assurances",
  "Cyber",
  "MP",
  "Pros"
];

let currentUser = "";
let globalData = {};
let ref = doc(db, "global", "objectifs");

function getToday(){
  const d = new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

window.login = async function() {
  const pass = document.getElementById("password").value;

  if(passwords[pass]){
    currentUser = passwords[pass];
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("welcome").innerText = "Bienvenue " + currentUser;

    if(currentUser === "Mariama"){
      document.getElementById("adminPanel").classList.remove("hidden");
    }

    await initData();
  } else {
    document.getElementById("error").innerText = "Mot de passe incorrect";
  }
}

async function initData(){
  const snap = await getDoc(ref);

  if(!snap.exists()){
    let initialData = { 
      totalClicks: 0, 
      personal: {},
      lastPersonalReset: getToday()
    };
    itemsList.forEach(item => initialData[item] = 0);
    Object.values(passwords).forEach(user => {
      initialData.personal[user] = 0;
    });
    await setDoc(ref, initialData);
  }

  await checkDailyReset();

  onSnapshot(ref, (docSnap) => {
    globalData = docSnap.data();
    display();
  });
}

async function checkDailyReset(){
  const snap = await getDoc(ref);
  const data = snap.data();
  const today = getToday();

  if(data.lastPersonalReset !== today){

    let resetPersonal = {};
    Object.values(passwords).forEach(user=>{
      resetPersonal[user] = 0;
    });

    await setDoc(ref, {
      personal: resetPersonal,
      lastPersonalReset: today
    }, { merge:true });
  }
}

function display(){
  document.getElementById("totalClicks").innerText = globalData.totalClicks || 0;

  if(globalData.personal && globalData.personal[currentUser] !== undefined){
    document.getElementById("personalCount").innerText =
      globalData.personal[currentUser];
  }

  const itemsContainer = document.getElementById("items");
  itemsContainer.innerHTML = "";

  const adminInputs = document.getElementById("adminInputs");
  adminInputs.innerHTML = "";

  itemsList.forEach(item=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <h3>${item}</h3>
      <p>Restant: <strong>${globalData[item] || 0}</strong></p>
      <button onclick="decrement('${item}')">Valider une vente</button>
    `;
    itemsContainer.appendChild(div);

    if(currentUser === "Mariama"){
      const inputLine = document.createElement("div");
      inputLine.innerHTML = `
        ${item} :
        <input type="number" id="input-${item}" value="${globalData[item] || 0}">
      `;
      adminInputs.appendChild(inputLine);
    }
  });
}

window.decrement = async function(item){

  if((globalData[item] || 0) <= 0){
    alert("Objectif atteint !");
    return;
  }

  const confirmation = confirm("Confirmer cette vente ?");
  if(!confirmation) return;

  let personalCount = globalData.personal[currentUser] || 0;

  await setDoc(ref, {
    [item]: globalData[item] - 1,
    totalClicks: (globalData.totalClicks || 0) + 1,
    personal: {
      ...globalData.personal,
      [currentUser]: personalCount + 1
    }
  }, { merge: true });
}

window.saveAllObjectives = async function(){
  let updates = {};
  itemsList.forEach(item=>{
    updates[item] = parseInt(document.getElementById("input-"+item).value) || 0;
  });
  await setDoc(ref, updates, { merge: true });
}

window.resetAll = async function(){
  const confirm1 = confirm("Confirmer le reset hebdomadaire ?");
  if(!confirm1) return;
  const confirm2 = confirm("Êtes-vous absolument sûre ?");
  if(!confirm2) return;

  let resetData = { totalClicks: 0 };
  itemsList.forEach(item => resetData[item] = 0);

  await setDoc(ref, resetData, { merge: true });
}
</script>

</body>
</html>
