body{
  font-family:'Inter',sans-serif;
  background:#0f0f0f;
  color:white;
  margin:0;
}

.header{
  background:#000;
  padding:20px;
  text-align:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

.header img{height:60px;}

.header h1{
  margin:10px 0 0 0;
  font-weight:600;
  font-size:22px;
  letter-spacing:1px;
  color:#ff7a00;
}

.container{
  margin-top:60px;
  text-align:center;
  padding:10px;
}

input{
  padding:8px;
  width:80px;
  border-radius:8px;
  border:none;
  margin:4px;
  text-align:center;
}

button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  max-width:100%;
}

button.validate{background:white;color:black;}
button.cancel{background:#222;color:white;margin-left:8px;}
button.cancel:disabled{opacity:0.3;cursor:not-allowed;}
button.catchup{background:#444;color:#ffd700;margin-left:8px;}

.btn-row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:0px;
  margin-top:10px;
}

.btn-row button{
  margin-top:0;
  flex:1 1 0;
  min-width:0;
  font-size:12px;
  padding:8px 6px;
}

.hidden{display:none;}

#welcome{
  text-align:center;
  margin-top:30px;
  font-weight:600;
}

#items{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:30px;
}

.item{
  background:#ff7a00;
  padding:14px 18px 16px 18px;
  margin:15px;
  border-radius:18px;
  width:260px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:0.2s;
}

.item:hover{transform:translateY(-6px);}

.item.glow{
  box-shadow:
    0 0 10px rgba(30,126,52,0.7),
    0 0 20px rgba(30,126,52,0.6),
    0 0 30px rgba(30,126,52,0.5);
}

@keyframes leaderFlash{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.item.leader-flash{
  animation:leaderFlash 1s ease;
}

.item h3{
  margin:4px 0 8px 0;
  font-size:18px;
}

.item p{
  margin:0 0 8px 0;
}

.progress-container{
  background:rgba(255,255,255,0.3);
  border-radius:20px;
  height:20px;
  margin-top:10px;
  overflow:hidden;
  position:relative;
}

.progress-bar{
  height:100%;
  width:0%;
  transition:width 0.5s ease;
  position:absolute;
  top:0;
  left:0;
  border-radius:20px;
  background:white;
}

.progress-text{
  position:relative;
  z-index:1;
  text-align:center;
  width:100%;
  line-height:20px;
  font-size:12px;
  font-weight:600;
}

.personal-line{
  font-size:14px;
  margin-top:4px;
  margin-bottom:0;
  font-weight:700;
  white-space:nowrap;
  line-height:1.2;
}

.personal-line strong{
  font-size:16px;
}

.admin-panel,
.ranking-panel,
.store-panel{
  background:#1c1c1c;
  padding:20px;
  margin:30px;
  border-radius:15px;
}

.sector-block{
  background:#111;
  border-radius:12px;
  padding:16px;
  margin-bottom:20px;
}

.sector-block h2{
  margin:0 0 14px 0;
  font-size:16px;
  font-weight:700;
  color:#ff7a00;
  letter-spacing:1px;
}

.ranking-panel h3,
.store-panel h3{
  margin-top:0;
  margin-bottom:12px;
}

.ranking-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:8px 10px;
  border-radius:10px;
  margin-bottom:8px;
  background:rgba(255,255,255,0.06);
  font-size:14px;

.ranking-row.top1{background:rgba(255,215,0,0.16);}
.ranking-row.top2{background:rgba(192,192,192,0.14);}
.ranking-row.top3{background:rgba(205,127,50,0.16);}

.ranking-left{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}

.ranking-rank{
  font-weight:700;
  width:26px;
  text-align:center;
}

.ranking-name{
  font-weight:600;
}

.ranking-score{
  font-weight:700;
}

/* Suivi boutique compact en 2 colonnes */
.store-progress-list{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:10px 12px;
}

.store-progress-row{
  border-radius:12px;
  padding:10px 12px;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
  transition:0.2s;
}

.store-progress-row:hover{
  transform:translateY(-2px);
}

.store-progress-row.glow{
  box-shadow:

    0 0 20px rgba(30,126,52,0.6),
    0 8px 18px rgba(0,0,0,0.25);
}

.store-progress-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
}

.store-progress-title{
  font-size:13px;
  font-weight:700;
}

.store-progress-meta{
  font-size:11px;
  text-align:right;
  white-space:nowrap;
  font-weight:600;
}

.store-progress-container{
  background:rgba(255,255,255,0.3);
  border-radius:999px;
  height:14px;
  overflow:hidden;
  position:relative;
}

.store-progress-bar{
  height:100%;
  width:0%;
  transition:width 0.5s ease;
  border-radius:999px;
  background:white;
}

.store-progress-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:10px;
  font-weight:700;
  pointer-events:none;
}

/* Directeur : deux colonnes secteurs */
.director-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;

.director-sector{
  background:#1c1c1c;
  border-radius:15px;
  padding:20px;

.director-sector h2{
  margin:0 0 14px 0;
  font-size:16px;
  font-weight:700;
  color:#ff7a00;
  text-align:center;

.director-kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.director-kpi-row{
  border-radius:10px;
  padding:8px 10px;
  background:#ff7a00;
}

.director-kpi-title{
  font-size:12px;
  font-weight:700;
  margin-bottom:4px;
}

.director-kpi-values{
  font-size:11px;
  opacity:0.9;
}

@media(max-width:768px){
  .item{width:90%;}
  button{font-size:18px;padding:14px;}
  .btn-row button{font-size:12px;padding:8px 6px;}

  .ranking-row{font-size:15px;}
  .store-progress-list{grid-template-columns:1fr;}
  .store-progress-head{flex-direction:column;align-items:flex-start;}
  .store-progress-meta{text-align:left;white-space:normal;}
  .director-grid{grid-template-columns:1fr;}
  .director-kpi-grid{grid-template-columns:1fr;}
  #directorSummary{grid-template-columns:repeat(2,1fr) !important;}
}

/* =====================================================================
   HASH
   ===================================================================== */
async function hashPassword(password){
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,"0")).join("");
}

  allUsers.forEach(u => {

/* =====================================================================
   COMPUTE SECTOR TOTALS FROM PERSONAL
   ===================================================================== */
function computeSectorTotals(personal){
  const totals = buildEmptySectorTotals();
  Object.keys(sectors).forEach(sk => {
    itemsList.forEach(item => {
      let t = 0;
      sectors[sk].stores.forEach(store => t += personal?.[store]?.[item] || 0);
      totals[sk][item] = t;
    });
  });
  return totals;
}

function computeWeeklySectorTotals(weeklyPersonal){
  const totals = buildEmptyWeeklySectorTotals();
  Object.keys(sectors).forEach(sk => {
    itemsList.forEach(item => {
      let t = 0;
      sectors[sk].stores.forEach(store => t += weeklyPersonal?.[store]?.[item] || 0);
      totals[sk][item] = t;
    });
  });
  return totals;
}

        weeklySectorTotals:  buildEmptyWeeklySectorTotals(),
        boutiqueObjectives:  buildEmptyManagerStoreMap(),
        boutiqueInitial:     buildEmptyManagerStoreMap(),
        boutiqueProgress:    buildEmptyManagerStoreMap(),
        dailyObjective:      buildEmptyDailyObjective(),
        lastPersonalReset:   getToday()
      };
      transaction.set(ref, data);
      return;
    }

    const data = snap.data();
    let patch = {};
    let needsPatch = false;

    /* personal */
    const safePersonal = data.personal || {};
    let patchedPersonal = null;
    let personalChanged = false;
    allUsers.forEach(u => {
      if(!safePersonal[u]){
        if(!patchedPersonal) patchedPersonal = structuredClone(safePersonal);
        patchedPersonal[u] = {};
        itemsList.forEach(i => patchedPersonal[u][i] = 0);
        personalChanged = true;
        return;
      }
      itemsList.forEach(i => {
        if(typeof safePersonal[u][i] !== "number"){
          if(!patchedPersonal) patchedPersonal = structuredClone(safePersonal);
          if(!patchedPersonal[u]) patchedPersonal[u] = {};
          patchedPersonal[u][i] = 0;
          personalChanged = true;
        }
      });
    });
    if(personalChanged){ patch.personal = patchedPersonal; needsPatch = true; }

    /* weeklyPersonal */
    const safeWeekly = data.weeklyPersonal || {};
    let patchedWeekly = null;
    let weeklyChanged = false;
    allUsers.forEach(u => {
      if(!safeWeekly[u]){
        if(!patchedWeekly) patchedWeekly = structuredClone(safeWeekly);
        patchedWeekly[u] = {};
        itemsList.forEach(i => patchedWeekly[u][i] = 0);
        weeklyChanged = true;
        return;
      }
      itemsList.forEach(i => {
        if(typeof safeWeekly[u][i] !== "number"){
          if(!patchedWeekly) patchedWeekly = structuredClone(safeWeekly);
          if(!patchedWeekly[u]) patchedWeekly[u] = {};
          patchedWeekly[u][i] = 0;
          weeklyChanged = true;
        }
      });
    });
    if(weeklyChanged){ patch.weeklyPersonal = patchedWeekly; needsPatch = true; }

    /* sectorTotals */
    const safeST = data.sectorTotals || {};
    let patchedST = structuredClone(safeST);
    let stChanged = false;
    Object.keys(sectors).forEach(sk => {
      if(!patchedST[sk]){ patchedST[sk] = {}; stChanged = true; }
      itemsList.forEach(i => {
        if(typeof patchedST[sk][i] !== "number"){ patchedST[sk][i] = 0; stChanged = true; }
      });
    });
    if(stChanged){ patch.sectorTotals = patchedST; needsPatch = true; }

    /* weeklySectorTotals */
    const safeWST = data.weeklySectorTotals || {};
    let patchedWST = structuredClone(safeWST);
    let wstChanged = false;
    Object.keys(sectors).forEach(sk => {
      if(!patchedWST[sk]){ patchedWST[sk] = {}; wstChanged = true; }
      itemsList.forEach(i => {
        if(typeof patchedWST[sk][i] !== "number"){ patchedWST[sk][i] = 0; wstChanged = true; }
      });
    });
    if(wstChanged){ patch.weeklySectorTotals = patchedWST; needsPatch = true; }

    /* boutiqueObjectives / Initial / Progress */
    const safeBO = data.boutiqueObjectives || {};
    const safeBI = data.boutiqueInitial    || {};
    const safeBP = data.boutiqueProgress   || {};
    let pBO = structuredClone(safeBO);
    let pBI = structuredClone(safeBI);
    let pBP = structuredClone(safeBP);
    let bChanged = false;
    allStoreUsers.forEach(store => {
      if(!pBO[store]){ pBO[store] = {}; bChanged = true; }
      if(!pBI[store]){ pBI[store] = {}; bChanged = true; }
      if(!pBP[store]){ pBP[store] = {}; bChanged = true; }
      managerItemsList.forEach(i => {
        if(typeof pBO[store][i] !== "number"){ pBO[store][i] = 0; bChanged = true; }
        if(typeof pBI[store][i] !== "number"){ pBI[store][i] = 0; bChanged = true; }
        if(typeof pBP[store][i] !== "number"){ pBP[store][i] = 0; bChanged = true; }
      });
    });
    if(bChanged){
      patch.boutiqueObjectives = pBO;
      patch.boutiqueInitial    = pBI;
      patch.boutiqueProgress   = pBP;
      needsPatch = true;
    }

    /* dailyObjective */
    const safeDO = data.dailyObjective || {};
    let pDO = { ...safeDO };
    let doChanged = false;
    allStoreUsers.forEach(store => {
      if(typeof pDO[store] !== "number"){ pDO[store] = 0; doChanged = true; }
    });
    if(doChanged){ patch.dailyObjective = pDO; needsPatch = true; }

    if(typeof data.lastPersonalReset !== "string"){
      patch.lastPersonalReset = getToday();
      needsPatch = true;
    }

    if(needsPatch) transaction.set(ref, patch, { merge:true });
  });
}

/* =====================================================================
   RESET DAILY PERSONAL
   ===================================================================== */
async function resetDailyPersonalIfNeeded(){
  const today = getToday();
  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);
    if(!snap.exists()) return;
    const data = snap.data();
    if(data.lastPersonalReset === today) return;
    transaction.set(ref, {
      personal: buildEmptyPersonal(),
      lastPersonalReset: today
    }, { merge:true });
  });
}

   LOGIN
   ===================================================================== */
window.login = async function(){
  const pass = document.getElementById("password").value;
  if(!window.crypto || !window.crypto.subtle){
    alert("Navigateur non compatible. Utilisez Chrome ou Safari récent.");
    return;
  }
  try{
    const hashed = await hashPassword(pass);
    const account = accounts[hashed];
    if(!account){
      document.getElementById("error").innerText = "Mot de passe incorrect";
      return;
    }
    currentUser   = account.name;
    currentRole   = account.role;
    currentSector = account.sector;
    currentStore  = account.store;

    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("welcome").innerText = "Bienvenue " + currentUser;

    if(isAdmin() || isManager()){
      document.getElementById("adminPanel").classList.remove("hidden");
      document.getElementById("rankingPanel").classList.remove("hidden");
    }

    if(isAdmin()){
      document.getElementById("globalSummaryPanel").classList.remove("hidden");
    }

    if(isStore() || isManager()){
      document.getElementById("txPanel").classList.remove("hidden");
      document.getElementById("storeTrackingPanel").classList.remove("hidden");
    }

    if(isDirector()){
      document.getElementById("directorPanel").classList.remove("hidden");
    }

    await initData();
  }catch(e){
    console.error(e);
    alert("Erreur lors de la connexion.");
  }
};

/* =====================================================================
   INIT DATA
   ===================================================================== */
async function initData(){
  await ensureDataStructure();
  if(unsubscribeSnapshot){ unsubscribeSnapshot(); unsubscribeSnapshot = null; }

  let adminRendered = false;
  unsubscribeSnapshot = onSnapshot(ref, (docSnap) => {
    globalData = docSnap.data() || {};

    if(isDirector()){
      renderDirector();
    } else {
      display();
      if(isAdmin() || isManager()){
        if(!adminRendered){ renderAdmin(); adminRendered = true; }
        renderRanking();
      }
      if(isAdmin()){ renderGlobalSummary(); }
      if(isStore() || isManager()){ renderStoreTracking(); renderTx(); }
    }
  });

  await resetDailyPersonalIfNeeded();
}

/* =====================================================================
   RENDER RANKING (admin secteur + manager)
   ===================================================================== */
function renderRanking(){
  const rankingContent = document.getElementById("rankingContent");
  if(!rankingContent) return;

  const sectorStores = getCurrentSectorStores();

  const rankingData = sectorStores.map(name => {
    let total = 0;
    itemsList.forEach(item => total += globalData.personal?.[name]?.[item] || 0);
    return { name, total };
  });

  rankingData.sort((a,b) => b.total !== a.total ? b.total - a.total : a.name.localeCompare(b.name,"fr"));

  const hasSales = rankingData.some(r => r.total > 0);
  if(!hasSales){
    rankingContent.innerHTML = `<div style="opacity:0.8;">Aucune vente aujourd'hui</div>`;
    return;
  }

  rankingContent.innerHTML = rankingData.map((row,index) => {
    let extraClass = "", medal = "";
    if(index === 0){ extraClass = "top1"; medal = "🥇"; }
    else if(index === 1){ extraClass = "top2"; medal = "🥈"; }
    else if(index === 2){ extraClass = "top3"; medal = "🥉"; }
    return `
      <div class="ranking-row ${extraClass}">
        <div class="ranking-left">
          <div class="ranking-rank">${medal || (index+1)}</div>
          <div class="ranking-name">${row.name}</div>
        </div>
        <div class="ranking-score">${row.total}</div>
      </div>`;
  }).join("");
}

/* =====================================================================
   DISPLAY TUILES KPI
   ===================================================================== */
function display(){
  const container = document.getElementById("items");
  container.innerHTML = "";
  const nextLeaderKeys = {};
  const sectorStores = getCurrentSectorStores();

  itemsList.forEach(item => {
    const hasObjective = !itemsWithoutObjective.includes(item);

    /* Totaux secteur */
    const sectorTotal   = globalData.sectorTotals?.[currentSector]?.[item] || 0;
    const weeklySector  = globalData.weeklySectorTotals?.[currentSector]?.[item] || 0;

    /* Objectif secteur (admin uniquement — stocké dans sectorTotals initial) */
    const initial       = globalData.boutiqueObjectives?.[currentStore]?.["__sectorInitial__"] || 0;

    /* Totaux du jour pour ce secteur */
    let todaySectorValue = 0;
    sectorStores.forEach(name => todaySectorValue += globalData.personal?.[name]?.[item] || 0);

    /* Valeurs boutique courante */
    const storeTodayValue = currentStore ? (globalData.personal?.[currentStore]?.[item] || 0) : 0;
    const storeWeekValue  = currentStore ? (globalData.weeklyPersonal?.[currentStore]?.[item] || 0) : 0;

    /* Objectif secteur = sectorTotals initial (géré par admin via un champ dédié) */
    const sectorInitial  = globalData.sectorInitial?.[currentSector]?.[item] || 0;
    const diff           = sectorInitial - sectorTotal;
    const percentBar     = Math.min(sectorInitial > 0 ? (sectorTotal / sectorInitial) * 100 : 0, 100);
    const percentText    = sectorInitial > 0 ? (sectorTotal / sectorInitial) * 100 : 0;

    let percentColor = "#ff7a00";
    if(percentText >= 100 && percentText < 120) percentColor = "#66cc88";
    if(percentText >= 120) percentColor = "#1e7e34";

    /* Leader parmi les boutiques du secteur */
    let leaderValue = 0, leaders = [];
    sectorStores.forEach(name => {
      const val = globalData.personal?.[name]?.[item] || 0;
      if(val > leaderValue){ leaderValue = val; leaders = [name]; }
      else if(val === leaderValue && val > 0){ leaders.push(name); }
    });
    const leaderKey = leaderValue > 0 ? `${leaders.join("|")}::${leaderValue}` : "";
    nextLeaderKeys[item] = leaderKey;

    let leaderHTML = "";
    if(hasTileOverview() && leaderValue > 0){
      const leaderNames = leaders.join(" / ");
      leaderHTML = `<div style="font-size:13px;margin-top:6px;font-weight:700;color:#FFD700;
        text-shadow:1px 1px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;">
        🏆 Boutique leader : ${leaderNames} (${leaderValue})</div>`;
    }

    /* Détail par boutique (admin + manager) */
    let detailHTML = "";
    if(hasTileOverview()){
      sectorStores.forEach(name => {
        if(currentStore && name === currentStore) return;
        const val = globalData.personal?.[name]?.[item] || 0;
        detailHTML += `<div style="font-size:12px;margin-top:2px;line-height:1.15;">${name} : ${val}</div>`;
      });
    }

    const cancelAllowed = !!(cancelTimers[item] && Date.now() < cancelTimers[item]);
    const canSell = !isAdmin();

    const div = document.createElement("div");
    div.className = "item";

    if(hasObjective){
      if(percentText >= 120){ div.style.background = "#1e7e34"; div.classList.add("glow"); }
      else if(percentText >= 100){ div.style.background = "#66cc88"; }
      else { div.style.background = "#ff7a00"; }
    } else {
      div.style.background = "#ff7a00";
    }

    if(hasTileOverview() && leaderValue > 0 &&
       previousLeaderKeys[item] !== undefined && previousLeaderKeys[item] !== leaderKey){
      div.classList.add("leader-flash");
    }

    const objectifText = sectorInitial > 0
      ? (diff >= 0 ? `Objectif restant : <strong>${diff}</strong>` : `Objectif dépassé de : <strong>${-diff}</strong>`)
      : "";

    const objectiveBlock = hasObjective && sectorInitial > 0 ? `
      <p>${objectifText}</p>
      ${isManager() ? `
        <div class="personal-line">Secteur semaine : <strong>${weeklySector}</strong></div>
        <div class="personal-line">Secteur aujourd'hui : <strong>${todaySectorValue}</strong></div>
      ` : ``}
      <div class="progress-container">
        <div class="progress-bar" style="width:${percentBar}%"></div>
        <div class="progress-text" style="color:${percentColor}">${percentText.toFixed(0)}%</div>
      </div>
    ` : (hasObjective && isManager() ? `
      ${isManager() ? `
        <div class="personal-line">Secteur semaine : <strong>${weeklySector}</strong></div>
        <div class="personal-line">Secteur aujourd'hui : <strong>${todaySectorValue}</strong></div>
      ` : ``}
    ` : ``);

    let extraManagerLines = "";
    if(isManager()){
      extraManagerLines = `
        <div class="personal-line">Boutique semaine : <strong>${storeWeekValue}</strong></div>
        <div class="personal-line">Boutique aujourd'hui : <strong>${storeTodayValue}</strong></div>
      `;
    }

    const weeklyText  = hasTileOverview() ? "Ventes du secteur semaine"     : "Ventes de la boutique semaine";
    const personalText= hasTileOverview() ? "Ventes du secteur aujourd'hui" : "Ventes de la boutique aujourd'hui";
    const weeklyUserValue = hasTileOverview() ? weeklySector : (globalData.weeklyPersonal?.[currentUser]?.[item] || 0);
    const userValue       = hasTileOverview() ? todaySectorValue : (globalData.personal?.[currentUser]?.[item] || 0);

    let buttonsHTML = "";
    if(canSell){
      if(isManager()){
        buttonsHTML = `
          <div class="btn-row">
            <button class="validate" onclick="decrement('${item}')">Valider</button>
            <button class="cancel" ${!cancelAllowed?"disabled":""} onclick="cancelSale('${item}')">Annuler</button>
            <button class="catchup" onclick="catchUpSale('${item}')">Rattraper</button>
          </div>`;
      } else {
        buttonsHTML = `
          <button class="validate" onclick="decrement('${item}')">Valider une vente</button>
          <button class="cancel" ${!cancelAllowed?"disabled":""} onclick="cancelSale('${item}')">Annuler</button>`;
      }
    }

    div.innerHTML = `
      <h3>${item}</h3>
      ${objectiveBlock}
      ${isManager() ? extraManagerLines : `
        <div class="personal-line">${weeklyText} : <strong>${weeklyUserValue}</strong></div>
        <div class="personal-line">${personalText} : <strong>${userValue}</strong></div>
      `}
      ${detailHTML}
      ${leaderHTML}
      ${buttonsHTML}
    `;

    container.appendChild(div);
  });

  previousLeaderKeys = nextLeaderKeys;
}

function renderStoreTracking(){

  if(!panel || !title || !content || !currentStore) return;

  const storeObjectives = globalData.boutiqueObjectives?.[currentStore] || {};
  const storeInitial    = globalData.boutiqueInitial?.[currentStore]    || {};
  const storeProgress   = globalData.boutiqueProgress?.[currentStore]   || {};

  content.innerHTML = boutiqueDisplayList.map(item => {
    const initial   = storeInitial[item] ?? 0;
    const progress  = storeProgress[item] ?? 0;
    const diff      = initial - progress;
    const percentText = initial > 0 ? (progress / initial) * 100 : 0;
    const percentBar  = Math.min(percentText, 100);

    let bgColor = "#ff7a00", textColor = "#ff7a00", extraClass = "";
    if(percentText >= 120){ bgColor = "#1e7e34"; textColor = "#1e7e34"; extraClass = "glow"; }
    else if(percentText >= 100){ bgColor = "#66cc88"; textColor = "#66cc88"; }

    const metaText = initial > 0
      ? (diff >= 0 ? `Reste : ${diff} • ${progress}/${initial}` : `Dépassé : ${-diff} • ${progress}/${initial}`)
      : `Aucun objectif • ${progress}`;

    return `
      <div class="store-progress-row ${extraClass}" style="background:${bgColor};">
        <div class="store-progress-head">
          <div class="store-progress-title">${item}</div>
          <div class="store-progress-meta">${metaText}</div>
        </div>
        <div class="store-progress-container">
          <div class="store-progress-bar" style="width:${percentBar}%;"></div>
          <div class="store-progress-text" style="color:${textColor};">${initial > 0 ? percentText.toFixed(0)+"%" : "0%"}</div>

      </div>`;
  }).join("");
}

        if(percentText >= 120){ bgColor = "#1e7e34"; textColor = "#1e7e34"; extraClass = "glow"; }
        else if(percentText >= 100){ bgColor = "#66cc88"; textColor = "#66cc88"; }

        const detailHTML = sectorStores.map(name => {
          const val = globalData.personal?.[name]?.[item] || 0;
          return `<div style="font-size:11px;margin-top:2px;line-height:1.3;">${name} : <strong>${val}</strong></div>`;
        }).join("");

        /* Leader */
        let leaderValue = 0, leaders = [];
        sectorStores.forEach(name => {
          const val = globalData.personal?.[name]?.[item] || 0;
          if(val > leaderValue){ leaderValue = val; leaders = [name]; }
          else if(val === leaderValue && val > 0){ leaders.push(name); }
        });
        const leaderHTML = leaderValue > 0 ? `
          <div style="font-size:11px;margin-top:6px;font-weight:700;color:#FFD700;
            text-shadow:1px 1px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;">
            🏆 ${leaders.join(" / ")} (${leaderValue})
          </div>` : "";

        const objectifText = sectorInitial > 0
          ? (todayTotal <= sectorInitial
            ? `Reste : ${sectorInitial - todayTotal}`
            : `Dépassé : +${todayTotal - sectorInitial}`)
          : "";

        return `
          <div class="director-kpi-row ${extraClass}" style="background:${bgColor};">
            <div class="director-kpi-title" style="font-size:13px;margin-bottom:6px;">${item}</div>
            ${detailHTML}
            ${leaderHTML}
            <div style="margin-top:6px;font-size:12px;font-weight:700;">
              Total : ${todayTotal}${sectorInitial > 0 ? ` / ${sectorInitial}` : ""}
              &nbsp;•&nbsp; Semaine : ${weeklyTotal}
            </div>
            ${sectorInitial > 0 ? `
            <div style="font-size:11px;opacity:0.85;margin-bottom:4px;">${objectifText}</div>
            <div class="store-progress-container" style="margin-top:4px;">
              <div class="store-progress-bar" style="width:${percentBar}%;"></div>
              <div class="store-progress-text" style="color:${textColor};">${percentText.toFixed(0)}%</div>
            </div>` : ""}
          </div>`;
      }).join("");
    }
  });
}

/* =====================================================================
   DECREMENT (valider une vente)
   ===================================================================== */
window.decrement = async function(item){
  if(isAdmin()) return;
  if(!confirm("Confirmer cette vente ?")) return;

  cancelTimers[item] = Date.now() + 20000;
  if(cancelTimerTimeouts[item]) clearTimeout(cancelTimerTimeouts[item]);
  cancelTimerTimeouts[item] = setTimeout(() => {
    cancelTimers[item] = null;
    display();
  }, 20000);

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);
    if(!snap.exists()) return;
    const data = snap.data();

    const targetStore  = isManager() ? currentStore : currentUser;
    const targetSector = currentSector;

    const cP  = data.personal            || {};
    const cWP = data.weeklyPersonal       || {};
    const cST = data.sectorTotals         || {};
    const cWST= data.weeklySectorTotals   || {};
    const cBP = data.boutiqueProgress     || {};

    const payload = {
      personal: {
        ...cP,
        [targetStore]: { ...(cP[targetStore]||{}), [item]: (cP[targetStore]?.[item]||0)+1 }
      },
      weeklyPersonal: {
        ...cWP,
        [targetStore]: { ...(cWP[targetStore]||{}), [item]: (cWP[targetStore]?.[item]||0)+1 }
      },
      sectorTotals: {
        ...cST,
        [targetSector]: { ...(cST[targetSector]||{}), [item]: (cST[targetSector]?.[item]||0)+1 }
      },
      weeklySectorTotals: {
        ...cWST,
        [targetSector]: { ...(cWST[targetSector]||{}), [item]: (cWST[targetSector]?.[item]||0)+1 }
      }
    };

    if(managerItemsList.includes(item)){
      const bpm = cBP[targetStore] || {};
      payload.boutiqueProgress = {
        ...cBP,
        [targetStore]: { ...bpm, [item]: (bpm[item]||0)+1 }
      };
    }

    transaction.set(ref, payload, { merge:true });
  });
};

/* =====================================================================
   CANCEL SALE
   ===================================================================== */
window.cancelSale = async function(item){
  if(isAdmin()) return;
  if(!cancelTimers[item] || Date.now() > cancelTimers[item]) return;

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);
    if(!snap.exists()) return;
    const data = snap.data();

    const targetStore  = isManager() ? currentStore : currentUser;
    const targetSector = currentSector;

    const cP  = data.personal            || {};
    const cWP = data.weeklyPersonal       || {};
    const cST = data.sectorTotals         || {};
    const cWST= data.weeklySectorTotals   || {};
    const cBP = data.boutiqueProgress     || {};

    const payload = {
      personal: {
        ...cP,
        [targetStore]: { ...(cP[targetStore]||{}), [item]: Math.max((cP[targetStore]?.[item]||0)-1,0) }
      },
      weeklyPersonal: {
        ...cWP,
        [targetStore]: { ...(cWP[targetStore]||{}), [item]: Math.max((cWP[targetStore]?.[item]||0)-1,0) }
      },
      sectorTotals: {
        ...cST,
        [targetSector]: { ...(cST[targetSector]||{}), [item]: Math.max((cST[targetSector]?.[item]||0)-1,0) }
      },
      weeklySectorTotals: {
        ...cWST,
        [targetSector]: { ...(cWST[targetSector]||{}), [item]: Math.max((cWST[targetSector]?.[item]||0)-1,0) }
      }
    };

    if(managerItemsList.includes(item)){
      const bpm = cBP[targetStore] || {};
      payload.boutiqueProgress = {
        ...cBP,
        [targetStore]: { ...bpm, [item]: Math.max((bpm[item]||0)-1,0) }
      };
    }

    transaction.set(ref, payload, { merge:true });
  });

  cancelTimers[item] = null;
  if(cancelTimerTimeouts[item]){ clearTimeout(cancelTimerTimeouts[item]); cancelTimerTimeouts[item] = null; }
};

/* =====================================================================
   RENDER ADMIN
   ===================================================================== */
function renderAdmin(){
  const div   = document.getElementById("adminInputs");
  const title = document.getElementById("adminTitle");

  /* Ne pas re-rendre si un input est en cours de saisie */
  const activeEl = document.activeElement;
  if(activeEl && activeEl.closest && activeEl.closest("#adminInputs")) return;

  div.innerHTML = "";

  if(isAdmin()){
    title.textContent = `Administration — ${sectors[currentSector]?.label}`;

    /* Objectifs secteur par KPI */
    const sectorInitial = globalData.sectorInitial?.[currentSector] || {};
    boutiqueDisplayList.forEach(item => {
      div.innerHTML += `
        <div>
          ${item} :
          <input type="number" id="obj-${item}" value="${sectorInitial[item] || 0}">
        </div>`;
    });
    return;
  }

  if(isManager()){
    title.textContent = `Administration boutique — ${currentStore}`;
    const boutiqueObjectives = globalData.boutiqueObjectives?.[currentStore] || {};
    const currentDailyObjective = globalData.dailyObjective?.[currentStore] || 0;

    document.getElementById("saveDailyBtn").classList.remove("hidden");

    div.innerHTML += `
      <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #444;">
        🎯 Objectif journalier (total placements) :
        <input type="number" id="obj-daily" value="${currentDailyObjective}">
        <br>
        <button onclick="saveDailyObjective()" style="background:#ffd700;color:#000;margin-top:8px;">Valider objectif journalier</button>
      </div>`;

    boutiqueDisplayList.forEach(item => {
      div.innerHTML += `
        <div>
          ${item} :
          <input type="number" id="obj-${item}" value="${boutiqueObjectives[item] || 0}">
        </div>`;
    });
  }
}

/* =====================================================================
   SAVE OBJECTIVES
   ===================================================================== */
window.saveObjectives = async function(){
  if(!confirm("Valider les nouveaux objectifs ?")) return;

  if(isAdmin()){
    const currentSectorInitial = globalData.sectorInitial || {};
    const updatedSectorInitial = { ...(currentSectorInitial[currentSector] || {}) };

    boutiqueDisplayList.forEach(item => {
      const val = parseInt(document.getElementById("obj-" + item).value) || 0;
      updatedSectorInitial[item] = val;
    });

    await setDoc(ref, {
      sectorInitial: {
        ...currentSectorInitial,
        [currentSector]: updatedSectorInitial
      }
    }, { merge:true });
    return;
  }

  if(isManager()){
    const cBO = globalData.boutiqueObjectives || {};
    const cBI = globalData.boutiqueInitial    || {};
    const cBP = globalData.boutiqueProgress   || {};

    const updatedObj  = { ...(cBO[currentStore] || {}) };
    const updatedInit = { ...(cBI[currentStore] || {}) };
    const resetProg   = { ...(cBP[currentStore] || {}) };

    boutiqueDisplayList.forEach(item => {
      const val = parseInt(document.getElementById("obj-" + item).value) || 0;
      updatedObj[item]  = val;
      updatedInit[item] = val;
      resetProg[item]   = 0;
    });

    await setDoc(ref, {
      boutiqueObjectives: { ...cBO, [currentStore]: updatedObj },
      boutiqueInitial:    { ...cBI, [currentStore]: updatedInit },
      boutiqueProgress:   { ...cBP, [currentStore]: resetProg }
    }, { merge:true });
  }
};

/* =====================================================================
   SAVE DAILY OBJECTIVE (bouton séparé — ne remet pas les KPI à zéro)
   ===================================================================== */
window.saveDailyObjective = async function(){
  if(!isManager()) return;
  if(!confirm("Valider l'objectif journalier ?")) return;

  const dailyVal = parseInt(document.getElementById("obj-daily").value) || 0;
  const cDO = globalData.dailyObjective || {};

  await setDoc(ref, {
    dailyObjective: { ...cDO, [currentStore]: dailyVal }
  }, { merge:true });
};

/* =====================================================================
   RESET WEEKLY
   ===================================================================== */
window.resetWeekly = async function(){
  if(!confirm("Réinitialiser tous les objectifs ?")) return;

  if(isAdmin()){
    await runTransaction(db, async (transaction) => {
      const snap = await transaction.get(ref);
      if(!snap.exists()) return;
      const data = snap.data();

      const cST  = data.sectorTotals        || {};
      const cWST = data.weeklySectorTotals   || {};
      const cSI  = data.sectorInitial        || {};

      const newST  = { ...cST,  [currentSector]: {} };
      const newWST = { ...cWST, [currentSector]: {} };
      const newSI  = { ...cSI,  [currentSector]: {} };

      itemsList.forEach(item => {
        newST[currentSector][item]  = 0;
        newWST[currentSector][item] = 0;
        newSI[currentSector][item]  = 0;
      });

      /* Reset weeklyPersonal pour les boutiques du secteur */
      const cWP = data.weeklyPersonal || {};
      const newWP = { ...cWP };
      sectors[currentSector].stores.forEach(store => {
        newWP[store] = {};
        itemsList.forEach(item => newWP[store][item] = 0);
      });

      transaction.set(ref, {
        sectorTotals:       newST,
        weeklySectorTotals: newWST,
        sectorInitial:      newSI,
        weeklyPersonal:     newWP
      }, { merge:true });
    });
    return;
  }

  if(isManager()){
    await runTransaction(db, async (transaction) => {
      const snap = await transaction.get(ref);
      if(!snap.exists()) return;
      const data = snap.data();

      const cBO = data.boutiqueObjectives || {};
      const cBI = data.boutiqueInitial    || {};
      const cBP = data.boutiqueProgress   || {};

      const resetObj  = { ...(cBO[currentStore] || {}) };
      const resetInit = { ...(cBI[currentStore] || {}) };
      const resetProg = { ...(cBP[currentStore] || {}) };

      boutiqueDisplayList.forEach(item => {
        resetObj[item]  = 0;
        resetInit[item] = 0;
        resetProg[item] = 0;
      });

      transaction.set(ref, {
        boutiqueObjectives: { ...cBO, [currentStore]: resetObj },
        boutiqueInitial:    { ...cBI, [currentStore]: resetInit },
        boutiqueProgress:   { ...cBP, [currentStore]: resetProg }
      }, { merge:true });
    });
  }
};
