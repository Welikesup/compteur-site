<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Compteur Managers</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  text-align: center;
}

h2 {
  margin-top: 30px;
}

.container {
  margin-top: 40px;
}

#items {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.item {
  background: #ff7a00;
  padding: 20px;
  margin: 15px;
  border-radius: 16px;
  width: 260px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.item:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.6);
}

.item.success {
  background: #1e7e34;
}

button {
  padding: 10px 15px;
  margin-top: 12px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:not(.disabled) {
  background: white;
  color: black;
}

button.disabled {
  background: #444;
  color: #999;
  cursor: not-allowed;
}

input {
  padding: 6px;
  width: 90px;
  border-radius: 6px;
  border: none;
  text-align: center;
}

.hidden { display:none; }

.progress-container {
  background: rgba(255,255,255,0.3);
  border-radius: 20px;
  height: 10px;
  margin-top: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: white;
  width: 0%;
  transition: width 0.5s ease;
}

.item.success .progress-bar {
  background: #00ff88;
}

.personal-line {
  font-size: 14px;
  margin-top: 8px;
}

/* Responsive */
@media (max-width: 768px) {
  .item {
    width: 90%;
  }
}
</style>
</head>
<body>

<div id="login" class="container">
<h2>Connexion Manager</h2>
<input type="password" id="password" placeholder="Mot de passe">
<br><br>
<button onclick="login()">Entrer</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" class="hidden">
<h2 id="welcome"></h2>
<p>Total équipe : <strong id="totalClicks">0</strong></p>

<div id="items"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3nNMv12lIJcVrYyldg8dtNeRFKMldAo4",
  authDomain: "compteur-stn.firebaseapp.com",
  projectId: "compteur-stn",
  storageBucket: "compteur-stn.firebasestorage.app",
  messagingSenderId: "661197584248",
  appId: "1:661197584248:web:1dc33900c4422df4c53a8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "global", "objectifs");

const passwords = {
  "medine": "Le Havre",
  "dembele": "Evreux",
  "johannes": "Mondeville",
  "orelsan": "Caen",
  "lincheneau": "La Glacerie",
  "riles": "Rouen",
  "secteurstn": "Mariama"
};

const itemsList = [
  "Broadband",
  "Socle Mobiles",
  "MEV",
  "Terminaux",
  "Assurances",
  "Cyber",
  "MP",
  "Pros"
];

let currentUser = "";
let globalData = {};
let initialObjectives = {};

function getToday(){
  const d = new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

window.login = async function(){
  const pass = document.getElementById("password").value;
  if(passwords[pass]){
    currentUser = passwords[pass];
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("welcome").innerText = "Bienvenue " + currentUser;
    await initData();
  } else {
    document.getElementById("error").innerText = "Mot de passe incorrect";
  }
}

async function initData(){
  const snap = await getDoc(ref);

  if(!snap.exists()){
    let initialData = {
      totalClicks: 0,
      personal: {},
      lastPersonalReset: getToday()
    };

    itemsList.forEach(item => initialData[item] = 0);

    Object.values(passwords).forEach(user=>{
      initialData.personal[user] = {};
      itemsList.forEach(item=>{
        initialData.personal[user][item] = 0;
      });
    });

    await setDoc(ref, initialData);
  }

  await checkDailyReset();

  onSnapshot(ref, (docSnap)=>{
    globalData = docSnap.data();
    itemsList.forEach(item=>{
      if(!initialObjectives[item]){
        initialObjectives[item] = globalData[item];
      }
    });
    display();
  });
}

async function checkDailyReset(){
  const snap = await getDoc(ref);
  const data = snap.data();
  const today = getToday();

  if(data.lastPersonalReset !== today){
    let resetPersonal = {};
    Object.values(passwords).forEach(user=>{
      resetPersonal[user] = {};
      itemsList.forEach(item=>{
        resetPersonal[user][item] = 0;
      });
    });

    await setDoc(ref,{
      personal: resetPersonal,
      lastPersonalReset: today
    },{ merge:true });
  }
}

function animateCounter(element, start, end){
  let current = start;
  const increment = (end - start) / 20;
  const interval = setInterval(()=>{
    current += increment;
    if((increment > 0 && current >= end) || (increment < 0 && current <= end)){
      current = end;
      clearInterval(interval);
    }
    element.innerText = Math.floor(current);
  },20);
}

function display(){
  const totalEl = document.getElementById("totalClicks");
  animateCounter(totalEl, parseInt(totalEl.innerText)||0, globalData.totalClicks || 0);

  const itemsContainer = document.getElementById("items");
  itemsContainer.innerHTML = "";

  itemsList.forEach(item=>{
    const remaining = globalData[item] || 0;
    const initial = initialObjectives[item] || remaining;
    const percent = initial > 0 ? ((initial - remaining)/initial)*100 : 100;

    const personalValue = globalData.personal?.[currentUser]?.[item] || 0;

    const div = document.createElement("div");
    div.className = "item";

    let buttonHTML = `<button onclick="decrement('${item}')">Valider une vente</button>`;

    if(remaining === 0){
      div.classList.add("success");
      buttonHTML = `<button class="disabled" disabled>Objectif atteint</button>`;
    }

    div.innerHTML = `
      <h3>${item}</h3>
      <p>Objectif restant: <strong>${remaining}</strong></p>
      <div class="progress-container">
        <div class="progress-bar" style="width:${percent}%"></div>
      </div>
      <div class="personal-line">
        Mes ventes aujourd'hui : <strong>${personalValue}</strong>
      </div>
      ${buttonHTML}
    `;

    itemsContainer.appendChild(div);
  });
}

window.decrement = async function(item){
  if((globalData[item] || 0) <= 0) return;

  if(!confirm("Confirmer cette vente ?")) return;

  const currentPersonal = globalData.personal[currentUser][item] || 0;

  await setDoc(ref,{
    [item]: globalData[item] - 1,
    totalClicks: (globalData.totalClicks || 0) + 1,
    personal:{
      ...globalData.personal,
      [currentUser]:{
        ...globalData.personal[currentUser],
        [item]: currentPersonal + 1
      }
    }
  },{ merge:true });
}
</script>

</body>
</html>
